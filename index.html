<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L Clasico</title>
    <meta name="description" content="Футбольная лига школьного класса - турнирная таблица, матчи и голосование за MVP">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <h1>L Clasico</h1>
            <div class="header-actions">
                <!-- Auth buttons for regular users -->
                <div id="authButtons" class="auth-buttons">
                    <button class="btn btn-secondary" id="loginBtn">Войти</button>
                </div>
                <!-- User info when logged in -->
                <div id="userInfo" class="user-info hidden">
                    <span id="userEmail" class="user-email"></span>
                    <button class="btn btn-secondary btn-small" id="userLogoutBtn">Выйти</button>
                </div>
                <!-- Admin button -->
                <button class="btn btn-primary" id="adminBtn">Админ</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
        <!-- LEAGUE TABLE SECTION -->
        <section class="card">
            <div class="card-header">
                <h2 class="card-title">Турнирная Таблица</h2>
            </div>
            <div class="league-table-wrapper">
                <table class="league-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Команда</th>
                            <th>И</th>
                            <th>В</th>
                            <th>Н</th>
                            <th>П</th>
                            <th>Голы</th>
                            <th>О</th>
                            <th>Форма</th>
                        </tr>
                    </thead>
                    <tbody id="leagueTableBody">
                        <!-- Table rows will be inserted here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- RECENT MATCHES SECTION -->
        <section class="card mt-lg">
            <div class="card-header">
                <h2 class="card-title">Последние Матчи</h2>
            </div>
            <div class="matches-grid" id="matchesGrid">
                <!-- Match cards will be inserted here by JavaScript -->
            </div>
        </section>

        <!-- ADMIN PANEL -->
        <section class="admin-panel" id="adminPanel">
            <div class="card">
                <div class="admin-header">
                    <h2 class="card-title">Панель Администратора</h2>
                    <button class="btn btn-danger" id="adminLogoutBtn">Выйти</button>
                </div>
                <div class="admin-actions">
                    <button class="btn btn-primary" id="addMatchBtn">➕ Добавить Матч</button>
                </div>
            </div>
        </section>
    </main>

    <!-- USER AUTH MODAL (Login/Register) -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="authModalTitle">Вход</h3>
                <button class="modal-close" id="closeAuthModal">&times;</button>
            </div>

            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" data-tab="login">Вход</button>
                <button class="auth-tab" id="registerTab" data-tab="register">Регистрация</button>
            </div>

            <!-- Login Form -->
            <form id="userLoginForm" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                </div>
                <div id="loginFormError"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelAuthLogin">Отмена</button>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="userRegisterForm" class="auth-form hidden">
                <div class="form-group">
                    <label class="form-label" for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerPassword">Пароль</label>
                    <input type="password" id="registerPassword" class="form-input" placeholder="Минимум 6 символов"
                        minlength="6" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerPasswordConfirm">Подтвердите пароль</label>
                    <input type="password" id="registerPasswordConfirm" class="form-input" placeholder="••••••••"
                        required>
                </div>
                <div id="registerFormError"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelAuthRegister">Отмена</button>
                    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ADMIN LOGIN MODAL -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Вход в Админку</h3>
                <button class="modal-close" id="closeLoginModal">&times;</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Логин</label>
                    <input type="text" id="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <div id="loginError"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelLogin">Отмена</button>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ADD/EDIT MATCH MODAL -->
    <div class="modal" id="matchModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 class="modal-title" id="matchModalTitle">Добавить Матч</h3>
                <button class="modal-close" id="closeMatchModal">&times;</button>
            </div>
            <form id="matchForm">
                <input type="hidden" id="matchId">
                <div class="form-group">
                    <label class="form-label" for="team1">Команда 1</label>
                    <select id="team1" class="form-select" required>
                        <option value="1 группа">1 группа</option>
                        <option value="2 группа">2 группа</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="team2">Команда 2</label>
                    <select id="team2" class="form-select" required>
                        <option value="1 группа">1 группа</option>
                        <option value="2 группа">2 группа</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="score1">Счёт Команды 1</label>
                        <input type="number" id="score1" class="form-input" min="0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="score2">Счёт Команды 2</label>
                        <input type="number" id="score2" class="form-input" min="0" required>
                    </div>
                </div>

                <!-- Goal Scorers Section -->
                <div id="team1ScorersContainer" class="scorers-container" style="display: none;">
                    <label class="form-label">Голы Команды 1</label>
                    <div id="team1Scorers" class="scorer-inputs"></div>
                </div>

                <div id="team2ScorersContainer" class="scorers-container" style="display: none;">
                    <label class="form-label">Голы Команды 2</label>
                    <div id="team2Scorers" class="scorer-inputs"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="matchDate">Дата Матча</label>
                    <input type="date" id="matchDate" class="form-input" required>
                </div>
                <div id="matchError"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelMatch">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MVP VOTING MODAL -->
    <div class="modal" id="votingModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">🏆 Голосование за MVP</h3>
                <button class="modal-close" id="closeVotingModal">&times;</button>
            </div>
            <div id="votingContent">
                <p class="voting-description">Выберите лучшего игрока матча:</p>
                <div id="votingTimer" class="voting-timer"></div>
                <div id="playersList" class="players-list">
                    <!-- Players will be inserted here -->
                </div>
                <div id="votingError"></div>
                <div id="votingSuccess" class="voting-success hidden">
                    <span class="success-icon">✅</span>
                    <span>Ваш голос учтён!</span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelVoting">Закрыть</button>
                <button type="button" class="btn btn-primary" id="submitVoteBtn" disabled>Проголосовать</button>
            </div>
        </div>
    </div>

    <!-- MATCH DETAILS MODAL -->
    <div class="modal" id="matchDetailsModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 class="modal-title" id="matchDetailsTitle">Подробности матча</h3>
                <button class="modal-close" id="closeMatchDetailsModal">&times;</button>
            </div>
            <div id="matchDetailsContent">
                <!-- Match details will be inserted here -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="closeMatchDetails">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- Firebase Configuration -->
    <script src="firebase-config.js"></script>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>

</html>
