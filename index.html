<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L Clasico</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <h1>L Clasico</h1>
            <button class="btn btn-primary" id="adminBtn">Админ</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
        <!-- LEAGUE TABLE SECTION -->
        <section class="card">
            <div class="card-header">
                <h2 class="card-title">Турнирная Таблица</h2>
            </div>
            <div class="league-table-wrapper">
                <table class="league-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Команда</th>
                            <th>И</th>
                            <th>В</th>
                            <th>Н</th>
                            <th>П</th>
                            <th>Голы</th>
                            <th>О</th>
                            <th>Форма</th>
                        </tr>
                    </thead>
                    <tbody id="leagueTableBody">
                        <!-- Table rows will be inserted here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- RECENT MATCHES SECTION -->
        <section class="card mt-lg">
            <div class="card-header">
                <h2 class="card-title">Последние Матчи</h2>
            </div>
            <div class="matches-grid" id="matchesGrid">
                <!-- Match cards will be inserted here by JavaScript -->
            </div>
        </section>

        <!-- ADMIN PANEL -->
        <section class="admin-panel" id="adminPanel">
            <div class="card">
                <div class="admin-header">
                    <h2 class="card-title">Панель Администратора</h2>
                    <button class="btn btn-danger" id="logoutBtn">Выйти</button>
                </div>
                <div class="admin-actions">
                    <button class="btn btn-primary" id="addMatchBtn">➕ Добавить Матч</button>
                </div>
            </div>
        </section>
    </main>

    <!-- LOGIN MODAL -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Вход в Админку</h3>
                <button class="modal-close" id="closeLoginModal">&times;</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Логин</label>
                    <input type="text" id="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <div id="loginError"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelLogin">Отмена</button>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ADD/EDIT MATCH MODAL -->
    <div class="modal" id="matchModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="matchModalTitle">Добавить Матч</h3>
                <button class="modal-close" id="closeMatchModal">&times;</button>
            </div>
            <form id="matchForm">
                <input type="hidden" id="matchId">
                <div class="form-group">
                    <label class="form-label" for="team1">Команда 1</label>
                    <select id="team1" class="form-select" required>
                        <option value="1 группа">1 группа</option>
                        <option value="2 группа">2 группа</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="team2">Команда 2</label>
                    <select id="team2" class="form-select" required>
                        <option value="1 группа">1 группа</option>
                        <option value="2 группа">2 группа</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="score1">Счёт Команды 1</label>
                        <input type="number" id="score1" class="form-input" min="0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="score2">Счёт Команды 2</label>
                        <input type="number" id="score2" class="form-input" min="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="matchDate">Дата Матча</label>
                    <input type="date" id="matchDate" class="form-input" required>
                </div>
                <div id="matchError"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelMatch">Отмена</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
